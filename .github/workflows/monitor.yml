name: Beyblade Stock Monitor

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (GitHub may delay a few min)
  workflow_dispatch: {}       # manual "Run workflow" button

permissions:
  contents: write             # needed to commit state.json back

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Upload debug artifacts (if any parser failed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_*.html
          if-no-files-found: ignore
          retention-days: 3

      - name: Commit updated state
        run: |
          git config user.name  "stock-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
